name: Deploy to GitHub Pages

on:
  push:
    branches: [main, newhomepage]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          GITHUB_PAGES: 'true'
          GH_PAGES_SUBPATH: ${{ github.ref_name != 'main' && format('/{0}', github.ref_name) || '' }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./out
          destination_dir: ${{ github.ref_name != 'main' && github.ref_name || '.' }}
          keep_files: ${{ github.ref_name != 'main' }}
